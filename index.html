<!DOCTYPE html>
<html>
<head>
    <title>Just Followers - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <h1>Just Followers</h1>

        <p id="message"></p>
    </div>

<script src="script.js"></script>
</body>
</html>
